<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>
    <script>
        // what are callbacks
        // callbacks are basically function that are passed onto other function 
        // you may have used callbacks in for each loops
        // eg- arr.forEach(()=>{})
        // here in a function forEach is used to usme the ary data automatically
        // we will learn about how are callbacks are actually used , so callbacks are used to pass function to another function
        // let us learn what is a callback hell
        // call back hell happen's when we call multiple callbacks and is makes it difficult to handel and understand
        // making a call back hell and also resolving it by using better ways of it

        // How to use callbacks and learn what is callback hell
        let getData = (DataId, getNextData) => {
            console.log("Some Data :" + DataId);
            if (getNextData) getNextData();
        }

        console.log("Getting data one: ");
        getData(1, () => {
            console.log("Getting data 2");
            getData(2, () => {
                console.log("Getting data 3")
                getData(3);
            })
        })
        // Now this is a complex procedure to follow and it is called as callback hell

        //this same thing can be done by promices that is a better way to remove callbacks

        // lets us learn about what are promices and its syntax
    </script>
</body>

</html>

<!DOCTYPE html>

    <title>Document</title>
    <style>
        .cont {
            /* background-color: black; */
            display: flex;
            width: 80vw;
            flex-direction: column;
        }

        .videoDataAndThumbnailComponent {
            /* color: white; */
            border: 1px solid black;

            display: flex;
            align-items: center;
            width: 60%;
            height: 150px
        }

        .imgOfCont {
            width: 25%;
            display: flex;
            border-radius: 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 10px;
        }

        .imgInCont {
            height: 100%;
            width: 100%;
            border-radius: 10px;
            object-fit: contain;
        }

        .timeOfCont {
            position: absolute;
            bottom: 10%;
            right: 5%;
            color: white;
            border-radius: 5px;
            padding: 3px;
            font-size: small;
            background-color: rgba(0, 0, 0, 0.721);
            font-weight: bolder;

        }

        .contOfCont {
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            height: 70%;
            width: 70%;
            justify-content: center;
        }

        .infoInCont {
            display: flex;
        }

        .titleOfContent {
            border: 1px solid black;
            width: 100%;
            height: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
